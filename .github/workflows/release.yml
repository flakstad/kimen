name: Release

on:
  push:
    tags:
      - "v[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Clojure + Babashka
        uses: DeLaGuardo/setup-clojure@13.2
        with:
          cli: latest
          bb: latest

      - name: Test
        run: bb test-all

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail
          clojure -T:build uber
          mkdir -p dist
          cp target/kimen.jar dist/kimen.jar
          cp bin/kimen dist/kimen
          chmod +x dist/kimen
          (cd dist && shasum -a 256 kimen kimen.jar > SHA256SUMS)

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/kimen
            dist/kimen.jar
            dist/SHA256SUMS
