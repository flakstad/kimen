name: test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  clojure-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13.2
        with:
          bb: latest
      - run: bb test

  clojure-itest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13.2
        with:
          bb: latest
      - run: bb itest

  clojure-sync-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13.2
        with:
          bb: latest
      - run: bb e2e-sync-all
