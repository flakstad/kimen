name: kimen-deploy-template

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Kimen profile name (without .kmap)"
        required: false
        default: "prod"
      deploy_command:
        description: "Deploy command to run under kimen project run"
        required: false
        default: "./scripts/deploy.sh"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeLaGuardo/setup-clojure@13.2
        with:
          bb: latest

      - name: Smoke-check kimen launcher
        run: ./bin/kimen version --json > /dev/null

      - name: Template checklist
        shell: bash
        env:
          KIMEN_AGE_IDENTITY: ${{ secrets.KIMEN_AGE_IDENTITY }}
          KIMEN_PASSPHRASE: ${{ secrets.KIMEN_PASSPHRASE }}
        run: |
          set -euo pipefail
          PROFILE="${{ inputs.profile }}"
          MAP_PATH=".kimen/profiles/${PROFILE}.kmap"
          if [[ ! -f "$MAP_PATH" ]]; then
            echo "::error::Missing map file: $MAP_PATH"
            exit 1
          fi
          if [[ ! -f "vault.age" ]]; then
            echo "::error::Missing bundle file: vault.age"
            exit 1
          fi
          if [[ -z "${KIMEN_AGE_IDENTITY:-}" ]]; then
            echo "::error::Missing secret KIMEN_AGE_IDENTITY"
            exit 1
          fi
          if [[ -z "${KIMEN_PASSPHRASE:-}" ]]; then
            echo "::error::Missing secret KIMEN_PASSPHRASE"
            exit 1
          fi

      - name: Materialize CI identity file
        shell: bash
        env:
          KIMEN_AGE_IDENTITY: ${{ secrets.KIMEN_AGE_IDENTITY }}
        run: |
          set -euo pipefail
          ID_FILE="${RUNNER_TEMP}/kimen/ci.agekey"
          mkdir -p "$(dirname "$ID_FILE")"
          printf '%s\n' "$KIMEN_AGE_IDENTITY" > "$ID_FILE"
          chmod 600 "$ID_FILE"
          echo "KIMEN_IDENTITY_FILE=$ID_FILE" >> "$GITHUB_ENV"

      - name: Open ciphertext vault bundle
        shell: bash
        env:
          KIMEN_VAULT: ${{ github.workspace }}/.kimen-ci/vault.db
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$KIMEN_VAULT")"
          ./bin/kimen bundle open \
            --in vault.age \
            --identity "$KIMEN_IDENTITY_FILE" \
            --out-vault "$KIMEN_VAULT" \
            --overwrite \
            --json | tee kimen-bundle-open.json

      - name: Doctor preflight
        env:
          KIMEN_VAULT: ${{ github.workspace }}/.kimen-ci/vault.db
          KIMEN_PASSPHRASE: ${{ secrets.KIMEN_PASSPHRASE }}
        run: ./bin/kimen doctor --profile "${{ inputs.profile }}" --bundle-in vault.age --identity "$KIMEN_IDENTITY_FILE" --strict --json | tee kimen-doctor.json

      - name: Render envfile artifact
        env:
          KIMEN_VAULT: ${{ github.workspace }}/.kimen-ci/vault.db
          KIMEN_PASSPHRASE: ${{ secrets.KIMEN_PASSPHRASE }}
        run: ./bin/kimen envfile --profile "${{ inputs.profile }}" --out "${RUNNER_TEMP}/app.env" --json | tee kimen-envfile.json

      - name: Deploy with scoped projection
        shell: bash
        env:
          KIMEN_VAULT: ${{ github.workspace }}/.kimen-ci/vault.db
          KIMEN_PASSPHRASE: ${{ secrets.KIMEN_PASSPHRASE }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2206
          DEPLOY_CMD=( ${{ inputs.deploy_command }} )
          ./bin/kimen project run --profile "${{ inputs.profile }}" -- "${DEPLOY_CMD[@]}"

      - name: Upload Kimen artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kimen-deploy-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            kimen-bundle-open.json
            kimen-doctor.json
            kimen-envfile.json
